defaults:
  - ../default.yml

experiment:
  id: E3
  name: proposed_segmented_cnn_texture
  description: "Modelo propuesto: MobileNetV2 con imagen segmentada y vector GLCM+DWT extraído desde ROI segmentada."

data:
  use_segmented_images: true
  use_texture_features: true
  texture_source: segmented

model:
  type: hybrid_mobilenet_texture
  pretrained: true
  freeze_backbone: false
  num_classes: 4

segmentation:
  enabled: true
  method: lab_otsu_morphology
  color_space: lab
  channel: a
  threshold: otsu
  morphology:
    opening: true
    closing: true
    kernel_size: 5

features:
  enabled: true
  methods:
    - glcm
    - dwt
  source: segmented
  normalize: true

training:
  epochs: 30
  batch_size: 8
  num_workers: 0
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 7
  monitor_metric: val_macro_f1
  monitor_mode: max
  optimizer: adamw
  scheduler: cosine