project:
  name: rice-leaf-hybrid-cnn
  seed: 42
  device: auto
  output_dir: runs

data:
  dataset_name: rice_leaf_4class
  raw_dir: data/raw/rice_leaf_disease
  processed_dir: data/processed
  segmented_dir: data/segmented
  features_dir: data/features
  split_dir: data/splits
  image_size: 224
  num_classes: 4
  class_names:
    - Bacterial Blight
    - Blast
    - Brown Spot
    - Tungro

training:
  epochs: 30
  batch_size: 8
  num_workers: 0
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 7
  monitor_metric: val_macro_f1
  monitor_mode: max
  optimizer: adamw
  scheduler: cosine

evaluation:
  primary_metric: macro_f1
  metrics:
    - accuracy
    - macro_precision
    - macro_recall
    - macro_f1
  save_confusion_matrix: true
  measure_inference_time: true